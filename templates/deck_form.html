{% extends "base.html" %}
{% block title %}{{ 'Deck bearbeiten' if deck else 'Neues Deck' }} – LernApp{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card shadow-sm">
      <div class="card-header bg-primary text-white">
        <h4 class="mb-0">
          <i class="bi bi-{{ 'pencil' if deck else 'plus-circle' }} me-2"></i>
          {{ 'Deck bearbeiten' if deck else 'Neues Deck erstellen' }}
        </h4>
      </div>
      <div class="card-body">
        <form method="POST">
          <div class="mb-3">
            <label for="name" class="form-label fw-semibold">Name <span class="text-danger">*</span></label>
            <input type="text" id="name" name="name" class="form-control"
                   value="{{ deck.name if deck else '' }}"
                   placeholder="z.B. Vokabeln Englisch" required autofocus>
          </div>
          <div class="mb-4">
            <label for="description" class="form-label fw-semibold">Beschreibung</label>
            <textarea id="description" name="description" class="form-control" rows="3"
                      placeholder="Kurze Beschreibung (optional)">{{ deck.description if deck else '' }}</textarea>
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">
              <i class="bi bi-check-lg me-1"></i>Speichern
            </button>
            <a href="{{ url_for('deck_detail', deck_id=deck.id) if deck else url_for('index') }}"
               class="btn btn-outline-secondary">
              <i class="bi bi-x-lg me-1"></i>Abbrechen
            </a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
